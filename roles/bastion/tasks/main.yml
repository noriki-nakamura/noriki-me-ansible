---
# iptables サービスの初期設定
- name: Install iptables-services
  dnf:
    name: iptables-services
    state: present

- name: Enable and start iptables service
  systemd:
    name: iptables
    state: started
    enabled: yes

# フォワーディングの有効化
- name: Enable IPv4 forwarding
  sysctl:
    name: net.ipv4.ip_forward
    value: '1'
    sysctl_set: yes
    state: present
    reload: yes

- name: Enable IPv6 forwarding
  sysctl:
    name: net.ipv6.conf.all.forwarding
    value: '1'
    sysctl_set: yes
    state: present
    reload: yes

- name: Get primary network interface name
  command: >
    bash -c "ip -4 route ls | grep default | grep -Po '(?<=dev )(\S+)' | head -1"
  register: primary_interface
  changed_when: false

# EC2 の通信制御は Security Group で行うため、iptables レベルでは全許可
- name: Set INPUT chain policy to ACCEPT
  iptables:
    chain: INPUT
    policy: ACCEPT
  notify: Save iptables rules

- name: Set OUTPUT chain policy to ACCEPT
  iptables:
    chain: OUTPUT
    policy: ACCEPT
  notify: Save iptables rules

- name: Check INPUT chain for REJECT rules
  shell: iptables -S INPUT | grep '\-j REJECT' | wc -l
  register: input_reject_rules
  changed_when: false
  check_mode: false

- name: Flush INPUT chain if REJECT rules exist
  iptables:
    chain: INPUT
    flush: yes
  when: (input_reject_rules.stdout | trim | int) > 0
  notify: Save iptables rules

# FORWARD チェーンに REJECT ルールが残っている場合のみフラッシュする
# (iptables-services のデフォルト設定対策 / 2度目以降の実行では skip される)
- name: Check FORWARD chain for REJECT rules
  shell: iptables -S FORWARD | grep '\-j REJECT' | wc -l
  register: forward_reject_rules
  changed_when: false
  check_mode: false

- name: Flush FORWARD chain if REJECT rules exist
  iptables:
    chain: FORWARD
    flush: yes
  when: (forward_reject_rules.stdout | trim | int) > 0
  notify: Save iptables rules

- name: Set FORWARD chain policy to ACCEPT
  iptables:
    chain: FORWARD
    policy: ACCEPT
  notify: Save iptables rules

- name: Set up IPv4 NAT MASQUERADE
  iptables:
    table: nat
    chain: POSTROUTING
    out_interface: "{{ primary_interface.stdout }}"
    jump: MASQUERADE
  notify: Save iptables rules

- name: Set up IPv6 NAT MASQUERADE
  iptables:
    table: nat
    chain: POSTROUTING
    out_interface: "{{ primary_interface.stdout }}"
    jump: MASQUERADE
    ip_version: ipv6
  notify: Save iptables rules
